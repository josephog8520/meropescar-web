<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despacho de Pesca | MeroPescar</title>
    <link rel="stylesheet" href="estilos-admin.css">
</head>
<body style="background-color: var(--gris-fondo);">

    <!-- Barra Superior de Control de Turno -->
    <div class="top-bar" style="background-color: #1e293b;">
        <div class="top-bar-container">
            <span class="top-bar-text">⚓ TRABAJO DE CAMPO — Módulo del Operador de Muelle</span>
            <span id="operador-nombre" style="font-weight: 700; color: #38bdf8;">Cargando operador...</span>
        </div>
    </div>

    <!-- Encabezado de Operaciones -->
    <header class="main-header" style="background: var(--blanco); border-bottom: 2px solid var(--gris-borde);">
        <div class="header-navigation">
            <div class="logo-container">
                <div class="logo-placeholder">
                    <span class="logo-icon">📦</span>
                    <div class="logo-text">
                        <span class="brand-name">MeroPescar</span>
                        <span class="brand-tagline">Terminal de Operaciones</span>
                    </div>
                </div>
            </div>
            
            <!-- Buscador Operativo Integrado en la Cabecera -->
            <div style="flex: 1; max-width: 400px; margin-left: 40px;">
                <input type="text" id="input-buscador-muelle" oninput="filtrarColaPorBusqueda()" placeholder="🔍 Buscar por RUC o ID de Orden..." style="width: 100%; padding: 8px 12px; border: 2px solid var(--gris-borde); border-radius: 6px; outline: none; font-size: 0.9rem;">
            </div>

            <div class="actions-container" style="margin-left: auto;">
                <button onclick="cerrarSesionOperador();" class="nav-action-link" style="background: #fee2e2; color: #dc2626; border: none; cursor: pointer; padding: 8px 12px; border-radius: 4px; font-weight: 700;">
                    🚪 Cerrar Turno
                </button>
            </div>
        </div>
    </header>

    <!-- CONTENIDO TRANSACCIONAL -->
    <main class="admin-layout-clean" style="max-width: 1100px; padding: 30px 20px;">

        <!-- GRIG DE KPIs PARA EL OPERADOR -->
        <div class="kpi-grid-container">
            <div class="kpi-card-operativo kpi-pendientes">
                <h4>Solicitudes Pendientes</h4>
                <div id="kpi-pendientes" class="kpi-value">0</div>
            </div>
            <div class="kpi-card-operativo kpi-entregados">
                <h4>Entregas Realizadas</h4>
                <div id="kpi-entregados" class="kpi-value">0</div>
            </div>
        </div>
        
        <!-- BARRA DE PESTAÑAS (I = Inventario, R = Reservas, D = Despachados) -->
        <div class="tabs-container" style="display: flex; gap: 5px; margin-bottom: -2px;">
            <button onclick="mostrarSeccion('inventario')" class="tab-btn active" id="btn-inventario">Inventario (I)</button>
            <button onclick="mostrarSeccion('reservas')" class="tab-btn" id="btn-reservas">Solicitudes (S)</button>
            <button onclick="mostrarSeccion('despachados')" class="tab-btn" id="btn-despachados">Entregados (E)</button>
        </div>

        <!-- CONTENEDOR PRINCIPAL QUE CAMBIA SU CONTENIDO -->
        <div id="seccion-activa" style="background: var(--blanco); padding: 25px; border-radius: 0 8px 8px 8px; border: 1px solid var(--gris-borde);">
            <!-- El contenido de la sección seleccionada aparecerá aquí -->
        </div>

    </main>

    <div id="modal-producto" class="modal-overlay">
        <div class="modal-content">
            <h3>Registrar Nuevo Producto</h3>
            <div class="form-group">
                <input type="text" id="prod-nombre" placeholder="Nombre del Producto">
                <input type="text" id="prod-especie" placeholder="Especie / Nombre Científico (Opcional)">
                <select id="prod-tipo">
                    <option value="Entero">🐟 Entero</option>
                    <option value="Filete">🔪 Filete</option>
                    <option value="Marisco">🦐 Marisco</option>
                </select>
                <input type="number" id="prod-precio" placeholder="Precio ($)">
                <input type="number" id="prod-stock" placeholder="Stock (lbs)">
                <input type="text" id="prod-foto" placeholder="URL de la imagen (Ej: https://...jpg)">
            </div>
            <!-- Solo actualiza la parte del botón cerrar -->
            <div class="modal-actions">
                <button onclick="guardarProducto()" class="btn-admin-save">Guardar Producto</button>
                <button onclick="document.getElementById('modal-producto').style.display='none'" class="btn-cerrar-modal">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Cargar librerías necesarias -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Cargar tu motor unificado (Sin type="module") -->
    <script src="../compartido/base-datos.js"></script>
    <script src="personal-despacho.js"></script>
</body>
</html>
