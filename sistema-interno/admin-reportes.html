<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Cierres Diarios | MeroPescar</title>
    <link rel="stylesheet" href="estilos-admin.css">
</head>
<body style="background-color: var(--gris-fondo);">

    <!-- Encabezado del Archivo de Reportes -->
    <header class="main-header" style="background-color: var(--azul-institucional); border-bottom: 3px solid var(--azul-frescura);">
        <div class="header-navigation">
            <div class="logo-container" onclick="window.location.href='admin-dashboard.html'" style="cursor:pointer;">
                <div class="logo-placeholder">
                    <span class="logo-icon" style="color: var(--blanco);">📚</span>
                    <div class="logo-text">
                        <span class="brand-name" style="color: var(--blanco);">MeroPescar</span>
                        <span class="brand-tagline" style="color: #93c5fd;">Archivo de Cierres de 24h</span>
                    </div>
                </div>
            </div>
            
            <div class="actions-container" style="margin-left: auto;">
                <a href="admin-dashboard.html" class="nav-action-link" style="background: rgba(25px, 25px, 25px, 0.1); color: var(--blanco); text-decoration: none; padding: 8px 15px; border-radius: 4px; font-weight: 700;">
                    ⬅ Volver al Dashboard
                </a>
            </div>
        </div>
    </header>

    <!-- CUERPO CENTRAL -->
    <main class="admin-layout-clean" style="max-width: 900px; padding: 30px 20px;">
        
        <div style="background: var(--blanco); padding: 25px; border-radius: 8px; border: 1px solid var(--gris-borde); margin-bottom: 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h2 style="color: var(--azul-institucional); font-size: 1.4rem; font-weight: 800;">Historial de Cierres Contables</h2>
                    <p style="color: var(--texto-secundario); font-size: 0.9rem; margin-top: 4px;">Registro de auditoría de reportes automáticos de 24 horas y cierres de contingencia.</p>
                </div>
                <!-- Botón de simulación rápida para no tener que esperar a la medianoche real -->
                <button onclick="simularGeneracionCierreInmediato();" style="background: #10b981; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: 700; font-size: 0.85rem;">
                    ⚙️ Simular Cierre de Hoy
                </button>
            </div>

            <!-- Contenedor donde se renderizará el listado histórico -->
            <div id="historial-reportes-contenedor">
                <!-- Se inyectará desde JS -->
            </div>
        </div>

    </main>

    <!-- Cargar librerías necesarias -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Cargar tu motor unificado (Sin type="module") -->
    <script src="../compartido/base-datos.js"></script>
    <script src="admin-reportes.js"></script>
</body>
</html>
