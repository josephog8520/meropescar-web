<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Mayorista | MeroPescar</title>
    <link rel="stylesheet" href="estilos-cliente.css">
</head>
<body>

    <!-- Reutilizamos el Átomo A -->
    <div class="top-bar">
        <div class="top-bar-container">
            <span class="top-bar-text">⚓ Distribución Mayorista — Coordinación de pedidos para despacho en Muelle de Salinas</span>
            <span class="top-bar-schedule">Horario de carga: Lun a Dom: 04:00 AM - 11:00 AM</span>
        </div>
    </div>

    <!-- Reutilizamos el Átomo B -->
    <header class="main-header">
        <div class="header-navigation">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <div class="logo-placeholder">
                    <span class="logo-icon">🐟</span>
                    <div class="logo-text">
                        <span class="brand-name">MeroPescar</span>
                        <span class="brand-tagline">Distribuidora</span>
                    </div>
                </div>
            </div>
            <div class="search-container">
                <form action="#" class="search-form" onsubmit="event.preventDefault(); filtrarPorTexto(this.querySelector('input').value);">
                    <input type="text" placeholder="Buscar producto... (Ej. Corvina)" class="search-input">
                    <button type="submit" class="search-button">🔍</button>
                </form>
            </div>
            <!-- ENLACES DE ACCESO MODIFICADOS CON BOTÓN DE SALIDA -->
            <div class="actions-container">
                <div class="nav-action-link cart-link" style="cursor:pointer;" onclick="abrirResumenSimulado()">
                    <span class="action-icon">🛒</span>
                    <span class="action-text">Pedido</span>
                    <span id="badge-contador" class="cart-badge-count">0</span>
                </div>
                
                <!-- AGREGADO id="btn-sesion-accion" PARA MANEJARLO DESDE JS -->
                <button id="btn-sesion-accion" class="nav-action-link" style="border: none; cursor: pointer;">
                    <!-- El texto y los estilos se inyectarán dinámicamente desde catalogo.js -->
                </button>
            </div>
        </div>
    </header>

    <!-- ÁREA DEL CATÁLOGO -->
    <main class="catalog-layout">
        
        <!-- Botones de Filtro por Tipo -->
        <div class="filter-container">
            <button class="btn-filter active" onclick="filtrarCategoria('todos', this)">Todos los Productos</button>
            <button class="btn-filter" onclick="filtrarCategoria('Entero', this)">Pescados Enteros</button>
            <button class="btn-filter" onclick="filtrarCategoria('Filete', this)">Filetes y Cortes</button>
            <button class="btn-filter" onclick="filtrarCategoria('Marisco', this)">Mariscos y Conchas</button>
        </div>

        <!-- Rejilla de Productos -->
        <div id="grid-catalogo" class="products-grid-catalog">
            <!-- Los productos se inyectarán de forma dinámica aquí -->
        </div>

    </main>

    <!-- Panel Lateral de Carrito -->
    <div id="panel-carrito" class="carrito-panel">
        <div class="carrito-header">
            <h3>Mi Reserva en Muelle</h3>
            <button onclick="cerrarCarrito()" class="btn-cerrar-carrito">✕</button>
        </div>
        <div id="lista-carrito" class="carrito-items">
            <!-- Los productos se inyectarán aquí -->
        </div>
        <div class="carrito-footer">
            <div class="total-final">Total: <span id="total-carrito">$0.00</span></div>
            <button onclick="confirmarPedidoFinal()" class="btn-confirmar-pedido">Confirmar Pedido</button>
        </div>
    </div>
    <div id="overlay-carrito" class="overlay-carrito" onclick="cerrarCarrito()"></div>
    
    <!-- Cargar librerías -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Cargar TU motor (debe ir antes que catalogo.js) -->
    <script src="../compartido/base-datos.js"></script>
    <script src="catalogo.js"></script>
</body>
</html>
